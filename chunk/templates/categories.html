{% extends "base.html" %}
{% block title %}{{ SITENAME }} &mdash; Categories{% endblock %}
{% block content_title %}
<div class="page-title">
	<h2>Categories on <span>{{ SITENAME }}</span> &hellip;</h2>
</div>
{% endblock %}
{% block content %}
{% for category, articles in categories %}
<h2 class="entry-title cat-title">
    <a href="{{ SITEURL }}/{{ category.url }}">{{ category }}</a>
</h2>
{% endfor %}
{% endblock %}
