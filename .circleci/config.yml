version: 2
jobs:
  build:
    docker:
      - image: circleci/python:3.6.1
    working_directory: ~/dmuhs.github.io
    branches:
      only:
        - source
    steps:
      - checkout
      - run:
          name: install dependencies
          command: pip install --user pelican ghp-import Markdown pillow
      - run:
          name: deploy on Github pages
          command: make publish github
