{% extends "base.html" %}
{% block content %}
<!--<h1>Archives for {{ SITENAME }}</h1>-->

<dl id="archive-list">
{% for article in dates %}
    <div class="archive-entry">
        <dd><a href="{{ SITEURL }}/{{ article.url }}">{{ article.title }}</a></dd>
        <dt>{{ article.locale_date }}</dt>
    </div>
{% endfor %}
</dl>
{% endblock %}
