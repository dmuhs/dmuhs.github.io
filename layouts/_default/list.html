{{ define "main" }}
  {{ if not .IsHome }}<h1>{{ .Title }}</h1>{{ end }}
  {{ $pages := .Pages }}
  {{ if .IsHome }}{{ $pages = where site.RegularPages "Section" "posts" }}{{ end }}
  <ul class="post-list">
    {{ range $pages.ByDate.Reverse }}
      <li><time datetime="{{ .Date.Format "2006-01-02T15:04:05-07:00" }}">{{ .Date.Format "02 Jan, 2006" }}</time><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
    {{ end }}
  </ul>
{{ end }}
