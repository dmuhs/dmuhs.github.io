{{ define "main" }}
  <article>
    <header class="article-header">
      <h1>{{ .Title }}</h1>
      {{ if eq .Section "posts" }}
        <p class="post-meta"><time datetime="{{ .Date.Format "2006-01-02T15:04:05-07:00" }}">{{ .Date.Format "02 Jan, 2006" }}</time>{{ with .Params.categories }} · {{ range . }}<a href="{{ with site.GetPage (printf "/categories/%s" (. | urlize)) }}{{ .RelPermalink }}{{ end }}">{{ . }}</a>{{ end }}{{ end }}</p>
      {{ end }}
    </header>
    {{ .Content }}
  </article>
{{ end }}
